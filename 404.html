<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#11283e">
  <meta name="robots" content="noindex">
  <title>Page not found — CatalogFix</title>
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      background: #11283e;
      color: #F6F6F6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .code {
      font-size: clamp(72px, 14vw, 140px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #e88130;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: rgba(246, 246, 246, 0.6);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    a.btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 5px;
      background: #e88130;
      color: #FFFFFF;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    a.btn:hover { background: #d3671d; }
    a.btn:focus-visible { outline: 2px solid #F6F6F6; outline-offset: 3px; }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>This page doesn't exist.</h1>
    <p>The page you're looking for was moved, removed, or never listed.<br>That one we can't fix — but your catalog, we can.</p>
    <a class="btn" href="/">Back to the homepage</a>
  </div>
</body>
</html>
